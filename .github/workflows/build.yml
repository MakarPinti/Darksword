name: Build DarkSword IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -sSL https://github.com/theos/sdks/archive/master.tar.gz | tar -xz -C $THEOS/sdks --strip-components=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build .deb
        run: |
          make package FINALPACKAGE=1
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Inject Info.plist and build IPA
        run: |
          DEB=$(find packages -name "*.deb" | sort | tail -1)
          echo "Found deb: $DEB"

          TMPDIR_BUILD=$(mktemp -d)
          cd "$TMPDIR_BUILD"
          ar x "$OLDPWD/$DEB"

          DATA=$(ls data.tar.* 2>/dev/null | head -1)
          case "$DATA" in
            *.gz)  tar xzf "$DATA" ;;
            *.xz)  tar xJf "$DATA" ;;
            *.bz2) tar xjf "$DATA" ;;
            *)     tar xf "$DATA"  ;;
          esac

          APP=$(find . -name "*.app" -maxdepth 8 | head -1)
          echo "App bundle: $APP"

          # Inject Info.plist
          cp "$OLDPWD/Info.plist" "$APP/Info.plist"
          echo "Info.plist injected"

          # Remove any Zone.Identifier junk
          find "$APP" -name "*Zone.Identifier" -delete
          find "$APP" -name "*.md" -delete

          echo "Contents of .app:"
          ls -la "$APP"

          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -qr DarkSword.ipa Payload/
          mv DarkSword.ipa "$OLDPWD/DarkSword.ipa"
          rm -rf "$TMPDIR_BUILD"

          echo "IPA size: $(du -sh $OLDPWD/DarkSword.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DarkSword-${{ github.run_number }}
          path: DarkSword.ipa
          retention-days: 30
